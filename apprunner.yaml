version: 1.0
runtime: nodejs20

build:
  commands:
    pre-build:
      - npm ci
      - npx prisma generate
    build:
      - npm run build
  env:
    - name: NODE_ENV
      value: production

run:
  command: node .next/standalone/server.js
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
